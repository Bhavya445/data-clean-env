name: data_clean_env
version: "1.0.0"
description: >
  A data cleaning RL environment where an AI agent inspects dirty datasets
  and identifies quality issues (nulls, type errors, outliers, inconsistencies).
  Three tasks of increasing difficulty with programmatic graders.
tags:
  - openenv
  - data-cleaning
  - real-world
  - rl-environment
tasks:
  - name: null_hunter
    difficulty: easy
    description: Find null values and duplicate rows
  - name: type_fixer
    difficulty: medium
    description: Identify wrong data types and propose corrections
  - name: full_audit
    difficulty: hard
    description: Full data quality audit — nulls, types, outliers, inconsistencies
